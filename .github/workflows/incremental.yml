name: Incremental Build

on:
  schedule:
    - cron: '0 6 * * 1-5' # 6 AM UTC, weekdays
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  incremental:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check for new commits
        id: changes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the most recent incremental tag
          $lastTag = git tag --list "v*.*.*" --sort=-version:refname | Where-Object { $_ -notmatch "\.0$" } | Select-Object -First 1
          if ($lastTag) {
            $newCommits = git rev-list "$lastTag..HEAD" --count
            Write-Host "Commits since $lastTag`: $newCommits"
            if ($newCommits -eq 0 -and "${{ github.event_name }}" -eq "schedule") {
              Write-Host "No new commits since last incremental. Skipping."
              "skip=true" | Out-File -Append $env:GITHUB_OUTPUT
            } else {
              "skip=false" | Out-File -Append $env:GITHUB_OUTPUT
            }
          } else {
            Write-Host "No previous incremental tag found. Building."
            "skip=false" | Out-File -Append $env:GITHUB_OUTPUT
          }

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: steps.changes.outputs.skip != 'true'
        with:
          node-version: 22

      - name: Compute version
        if: steps.changes.outputs.skip != 'true'
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $parts = $pkg.version.Split('.')
          $major = $parts[0]
          $minor = $parts[1]
          # Count existing incremental tags for this major.minor to determine next patch
          $existing = git tag --list "v$major.$minor.*" --sort=-version:refname |
            Where-Object { $_ -ne "v$major.$minor.0" } |
            ForEach-Object { [int]($_ -replace "^v$major\.$minor\.","") } |
            Sort-Object -Descending |
            Select-Object -First 1
          $patch = if ($existing) { $existing + 1 } else { 1 }
          $version = "$major.$minor.$patch"
          npm version $version --no-git-tag-version
          "version=$version" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Incremental version: $version"

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: npm ci

      - name: Run tests
        if: steps.changes.outputs.skip != 'true'
        run: node --test test/*.test.js

      - name: Build MSI
        if: steps.changes.outputs.skip != 'true'
        run: npm run dist

      - name: Azure Login
        if: steps.changes.outputs.skip != 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSI
        if: steps.changes.outputs.skip != 'true'
        uses: azure/trusted-signing-action@87c2e83e6868da99d3380aa309851b32ed9a8346 # v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT_URL }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODE_SIGNING_PROFILE_NAME }}
          files-folder: dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create pre-release
        if: steps.changes.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $msi = Get-ChildItem -Path dist -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI found in dist/"
            exit 1
          }
          # Delete existing release/tag if it exists (re-runs)
          gh release delete $tag --yes 2>$null
          git push origin :refs/tags/$tag 2>$null
          # Create pre-release
          gh release create $tag $msi.FullName `
            --title "Incremental $version" `
            --prerelease `
            --notes "Automated incremental build #${{ github.run_number }} from main. Not a stable release."

      - name: Cleanup old incrementals
        if: steps.changes.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $cutoff = (Get-Date).AddDays(-14).ToString("yyyy-MM-ddTHH:mm:ssZ")
          $releases = gh release list --json tagName,isPrerelease,createdAt --limit 50 | ConvertFrom-Json
          foreach ($r in $releases) {
            if ($r.isPrerelease -and $r.createdAt -lt $cutoff) {
              Write-Host "Deleting old incremental: $($r.tagName)"
              gh release delete $r.tagName --yes
              git push origin :refs/tags/$($r.tagName) 2>$null
              $global:LASTEXITCODE = 0  # tag may already be gone — not an error
            }
          }
          exit 0

  incremental-mac:
    runs-on: macos-latest
    needs: incremental
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check for new commits
        id: changes
        run: |
          lastTag=$(git tag --list "v*.*.*" --sort=-version:refname | grep -v '\.0$' | head -1)
          if [ -n "$lastTag" ]; then
            newCommits=$(git rev-list "$lastTag..HEAD" --count)
            echo "Commits since $lastTag: $newCommits"
            if [ "$newCommits" -eq 0 ] && [ "${{ github.event_name }}" = "schedule" ]; then
              echo "No new commits since last incremental. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No previous incremental tag found. Building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: steps.changes.outputs.skip != 'true'
        with:
          node-version: 22

      - name: Compute version
        if: steps.changes.outputs.skip != 'true'
        id: version
        run: |
          version=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.') + '.${{ github.run_number }}'")
          npm version "$version" --no-git-tag-version
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Incremental version: $version"

      - name: Install dependencies
        if: steps.changes.outputs.skip != 'true'
        run: npm ci

      - name: Run tests
        if: steps.changes.outputs.skip != 'true'
        run: node --test test/*.test.js

      - name: Import Apple certificate
        if: steps.changes.outputs.skip != 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build macOS DMG (signed and notarized)
        if: steps.changes.outputs.skip != 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Incremental builds are signed and notarized so testers can open the
        # DMG without Gatekeeper warnings. Notarization adds 1-5 min per build.
        run: npx electron-builder --mac dmg --publish never

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          # Overwrite cert file before deletion as defense-in-depth
          if [ -f "$CERT_PATH" ]; then
            dd if=/dev/urandom of="$CERT_PATH" bs=1k count=$(du -k "$CERT_PATH" | cut -f1) conv=notrunc 2>/dev/null || true
            rm -f "$CERT_PATH"
          fi

      - name: Upload macOS artifact to pre-release
        if: steps.changes.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v$version"
          dmg=$(find dist -name "*.dmg" | head -1)
          if [ -z "$dmg" ]; then
            echo "No DMG found in dist/"
            exit 1
          fi
          echo "Uploading artifact: $dmg"
          gh release upload "$tag" "$dmg" --clobber
