name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.2). Must already exist.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve tag
        id: tag
        shell: pwsh
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $tag = $env:INPUT_TAG
          } else {
            $tag = $env:REF_NAME
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Invalid tag format: '$tag'. Expected vMAJOR.MINOR.PATCH (e.g. v1.0.0)."
            exit 1
          }
          $version = $tag -replace '^v', ''
          "tag=$tag" | Out-File -Append $env:GITHUB_OUTPUT
          "version=$version" | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Building release for tag: $tag (version: $version)"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Verify package.json version matches tag
        shell: pwsh
        run: |
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ steps.tag.outputs.version }}"
          if ($pkgVersion -ne $tagVersion) {
            Write-Error "Version mismatch: package.json=$pkgVersion, tag=$tagVersion"
            exit 1
          }
          Write-Host "Version verified: $pkgVersion"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test test/*.test.js

      - name: Build MSI
        run: npm run dist

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSI
        uses: azure/trusted-signing-action@87c2e83e6868da99d3380aa309851b32ed9a8346 # v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT_URL }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODE_SIGNING_PROFILE_NAME }}
          files-folder: dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload MSI to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $msi = Get-ChildItem -Path dist -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI found in dist/"
            exit 1
          }
          Write-Host "Uploading artifact: $($msi.FullName)"
          gh release upload $tag $msi.FullName --clobber

      - name: Verify release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.tag.outputs.tag }}"
          Write-Host "Release ${{ steps.tag.outputs.tag }} created and verified."

  release-mac:
    runs-on: macos-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: '$tag'. Expected vMAJOR.MINOR.PATCH (e.g. v1.0.0)."
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building macOS release for tag: $tag (version: $version)"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Verify package.json version matches tag
        run: |
          pkgVersion=$(node -p "require('./package.json').version")
          tagVersion="${{ steps.tag.outputs.version }}"
          if [ "$pkgVersion" != "$tagVersion" ]; then
            echo "Version mismatch: package.json=$pkgVersion, tag=$tagVersion"
            exit 1
          fi
          echo "Version verified: $pkgVersion"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test test/*.test.js

      - name: Build renderer
        # Compiles the Svelte renderer to dist-renderer/, which is
        # bundled into the .app via the build.files config. Without
        # this step the main process loads a missing app.html and the
        # window stays blank.
        run: npm run build:renderer

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac dmg --publish never

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          # Overwrite cert file before deletion as defense-in-depth
          if [ -f "$CERT_PATH" ]; then
            dd if=/dev/urandom of="$CERT_PATH" bs=1k count=$(du -k "$CERT_PATH" | cut -f1) conv=notrunc 2>/dev/null || true
            rm -f "$CERT_PATH"
          fi

      - name: Upload macOS artifact to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          dmg=$(find dist -name "*.dmg" | head -1)
          if [ -z "$dmg" ]; then
            echo "No DMG found in dist/"
            exit 1
          fi
          echo "Uploading artifact: $dmg"
          gh release upload "$tag" "$dmg" --clobber
